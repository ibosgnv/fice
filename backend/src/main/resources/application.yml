server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:ficedb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: fice-cooperative-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000  # 24h

logging:
  level:
    com.ibos.fice: DEBUG
