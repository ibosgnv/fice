<mat-sidenav-container class="sidenav-container">
  <mat-sidenav [opened]="sidenavOpen()" mode="side" class="sidenav">
    <div class="sidenav-brand">
      <div class="brand-icon">
        <span class="material-icons-round">account_balance</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">FICE</span>
        <span class="brand-sub">Back-office</span>
      </div>
    </div>

    <div class="agent-card">
      <div class="agent-avatar">
        {{ user()?.prenom?.charAt(0) }}{{ user()?.nom?.charAt(0) }}
      </div>
      <div class="agent-info">
        <span class="agent-name">{{ user()?.prenom }} {{ user()?.nom }}</span>
        <span class="agent-role">Agent</span>
      </div>
    </div>

    <nav class="nav-list">
      @for (item of navItems; track item.route) {
        <a class="nav-item" [routerLink]="item.route" routerLinkActive="nav-item--active">
          <span class="material-icons-round nav-item__icon">{{ item.icon }}</span>
          <span class="nav-item__label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidenav-footer">
      <button class="nav-item nav-item--logout" (click)="auth.logout()">
        <span class="material-icons-round nav-item__icon">logout</span>
        <span class="nav-item__label">Déconnexion</span>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="sidenavOpen.set(!sidenavOpen())">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>
      <app-lang-switcher />
      <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-btn">
        <span class="avatar-sm">{{ user()?.prenom?.charAt(0) }}{{ user()?.nom?.charAt(0) }}</span>
        <span>{{ user()?.prenom }}</span>
        <mat-icon>expand_more</mat-icon>
      </button>
      <mat-menu #profileMenu="matMenu">
        <button mat-menu-item (click)="auth.logout()">
          <mat-icon>logout</mat-icon>
          <span>Déconnexion</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
