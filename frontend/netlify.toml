[build]
  base    = "frontend"
  command = "npm ci && npm run build -- --configuration production"
  publish = "dist/fice-frontend/browser"

[build.environment]
  NODE_VERSION = "20"

# API proxy: route /api/* to the backend. Netlify's edge terminates TLS,
# so the browser only ever calls the same origin — no CORS, no mixed-content.
# NOTE: order matters — this MUST come before the SPA catch-all below.
[[redirects]]
  from   = "/api/*"
  to     = "http://164.132.193.85:8080/api/:splat"
  status = 200
  force  = true

# SPA fallback: any other unknown path → serve index.html so Angular router can handle it.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
